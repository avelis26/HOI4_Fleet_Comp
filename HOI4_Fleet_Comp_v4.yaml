class_philosophy: {
	"CV":   &CV_PHIL   "Max flight decks and speed at least = CA. No armor. Max Radar. 50:40:30 ratio of CVF:TB:CDB.",
	"CVL":  &CVL_PHIL  "Cheap (under 10k PC). Some armor. Runs in small fleet exposed. Pure AS. max fighters.",
	"BB":   &BB_PHIL   "Max main battery guns & armor. Radar & fire control. Rest DP and AA. Don't mix with CV's!",
	"CA":   &CA_PHIL   "Max main battery guns & armor. Radar & fire control. Rest DP and AA. Mini BB.",
	"CL":   &CL_PHIL   "DP for main guns. Balanced torps/ aa/ cat/ & dep. Radar and sonar. Max armor for screen defense.",
	"CLAA": &CLAA_PHIL "Max AA modules. Radar + fire control. DP for main battery guns to increase AA. So carriers may live.",
	"DD":   &DD_PHIL   "Balanced torpedeos + depth charges + ASW. Radar + sonar. Main screen for carriers.",
	"DE":   &DE_PHIL   "Max ASW. Radar + sonar. Max range and speed. AA for leftover slots.",
	"CM":   &CM_PHIL   "Max minelaying modules. Radar + sonar. Speed priority.",
	"SS":   &SS_PHIL   "Max torpedo tubes. Snorkel for max stealth. Cruiser sub hull for best range."
},
module_loadout: {
	"CV":   &CV_MOD   "HANG x6 | DP3 x1 | AA2 x1 | RAD3 x1 | ENG4 x1 | CVF x50 | TB x40 | CDB x30",
	"CVL":  &CVL_MOD  "HANG x2 | DP3 x4 | DAR x1 | AA2 x1 | RAD3 x1 | ENG4 x1 | CVF x40",
	"BB":   &BB_MOD   "AA2 x5 | HB5 x3 | DP3 x2 | FC2 x1 | RAD3 x1 | ENG2 x1 | ARM3 x1",
	"CA":   &CA_MOD   "HB3 x3 | DP3 x2 | AA2 x2 | FC2 x1 | RAD3 x1 | ENG3 x1 | ARM4 x1",
	"CL":   &CL_MOD   "AA2 x2 | TOR3 x2 | CAT2 x1 | DEP3 x1 | DP3 x2 | SON3 x1 | RAD3 x1 | ENG3 x1 | ARM4 x1",
	"CLAA": &CLAA_MOD "AA2 x5 | DP3 x3 | FC2 x1 | RAD3 x1 | ENG3 x1 | ARM4 x1",
	"DD":   &DD_MOD   "DEP3 x1 | TOR3 x2 | DP3 x2 | AA2 x1 | SON3 x1 | RAD3 x1 | ENG3 x1",
	"DE":   &DE_MOD   "DEP3 x3 | DP3 x1 | AA2 x1 | SON3 x1 | RAD3 x1 | TOR3 x1 | ENG3 x1",
	"CM":   &CM_MOD   "DP3 x2 | MLA x2 | AA2 x1 | SON3 x1 | RAD3 x1 | TOR3 x1 | ENG3 x1",
	"SS":   &SS_MOD   "TOR3 x3 | SNO3 x1 | ENG2 x1"
},

